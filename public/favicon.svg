<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="32" height="32" shape-rendering="crispEdges">
  <!-- Base Background -->
  <rect width="16" height="16" fill="#0a0a0a"/>

  <!-- Subtle scanline glitches -->
  <rect x="0" y="4" width="16" height="1" fill="#ff00c8" opacity="0.3"/>
  <rect x="0" y="10" width="16" height="1" fill="#00fff5" opacity="0.3"/>
  <rect x="0" y="7" width="16" height="1" fill="#00ff41" opacity="0.1"/>

  <!-- MAGENTA SHIFT (LEFT) -->
  <g fill="#ff00c8">
    <!-- Z -->
    <rect x="1" y="5" width="4" height="1"/>
    <rect x="4" y="6" width="1" height="1"/>
    <rect x="3" y="7" width="1" height="1"/>
    <rect x="2" y="8" width="1" height="1"/>
    <rect x="1" y="9" width="4" height="1"/>
    
    <!-- F -->
    <rect x="7" y="5" width="4" height="1"/>
    <rect x="7" y="6" width="1" height="1"/>
    <rect x="7" y="7" width="3" height="1"/>
    <rect x="7" y="8" width="1" height="1"/>
    <rect x="7" y="9" width="1" height="1"/>
  </g>

  <!-- CYAN SHIFT (RIGHT) -->
  <g fill="#00fff5">
    <!-- Z -->
    <rect x="3" y="5" width="4" height="1"/>
    <rect x="6" y="6" width="1" height="1"/>
    <rect x="5" y="7" width="1" height="1"/>
    <rect x="4" y="8" width="1" height="1"/>
    <rect x="3" y="9" width="4" height="1"/>
    
    <!-- F -->
    <rect x="9" y="5" width="4" height="1"/>
    <rect x="9" y="6" width="1" height="1"/>
    <rect x="9" y="7" width="3" height="1"/>
    <rect x="9" y="8" width="1" height="1"/>
    <rect x="9" y="9" width="1" height="1"/>
  </g>

  <!-- GREEN MAIN -->
  <g fill="#00ff41">
    <!-- Z -->
    <rect x="2" y="5" width="4" height="1"/>
    <rect x="5" y="6" width="1" height="1"/>
    <rect x="4" y="7" width="1" height="1"/>
    <rect x="3" y="8" width="1" height="1"/>
    <rect x="2" y="9" width="4" height="1"/>
    
    <!-- F -->
    <rect x="8" y="5" width="4" height="1"/>
    <rect x="8" y="6" width="1" height="1"/>
    <rect x="8" y="7" width="3" height="1"/>
    <rect x="8" y="8" width="1" height="1"/>
    <rect x="8" y="9" width="1" height="1"/>
  </g>

  <!-- Glitch Artifacts / Missing Pixels -->
  <rect x="3" y="5" width="1" height="1" fill="#00fff5"/> 
  <rect x="4" y="9" width="1" height="1" fill="#ff00c8"/>
  <rect x="9" y="5" width="1" height="1" fill="#0a0a0a"/>
  
  <!-- Random floating pixel glitches -->
  <rect x="14" y="3" width="1" height="1" fill="#00fff5"/>
  <rect x="12" y="11" width="1" height="1" fill="#00ff41"/>
  <rect x="2" y="12" width="1" height="1" fill="#ff00c8"/>
</svg>